name: Build e Deploy para Hostinger

on:
  push:
    branches:
      - main  # Dispara sempre que você fizer push na branch main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Baixar código
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Instalar dependências
        run: npm ci

      - name: 🏗️ Fazer o build do projeto
        run: npm run build

      - name: 🚀 Enviar para Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/        # pasta gerada pelo build do Vite
          server-dir: /public_html/ # pasta raiz do site na Hostinger
          timeout: 120000           # 2 min de paciência (padrão é 30s) — evita "Timeout (control socket)"
          port: 21                  # porta padrão de FTP da Hostinger
